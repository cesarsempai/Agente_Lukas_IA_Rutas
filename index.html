<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RutaIA - Logística Inteligente</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100%; width: 100%; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        @import "tailwindcss";
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar Izquierdo: Chat y Rutas -->
        <div class="w-96 bg-white border-r border-gray-200 flex flex-col shadow-xl z-10">
            <!-- Header -->
            <div class="p-6 border-b border-gray-100 bg-blue-600 text-white flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold flex items-center gap-2">
                        <span>🚚</span> RutaIA
                    </h1>
                    <p class="text-xs opacity-80">Logística Inteligente</p>
                </div>
                <button id="reset-btn" title="Cambiar Ubicación" class="p-2 hover:bg-blue-700 rounded-lg transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
            </div>

            <!-- Área de Chat / Rutas -->
            <div id="main-content" class="flex-1 overflow-y-auto p-4 custom-scrollbar">
                <!-- Los mensajes del chat aparecerán aquí -->
                <div id="chat-messages" class="space-y-4 mb-4">
                    <div class="bg-blue-50 p-3 rounded-lg text-sm text-blue-800">
                        Hola! Soy el asistente de rutas. A dónde quieres ir hoy?
                    </div>
                </div>

                <!-- Las tarjetas de rutas aparecerán aquí después de buscar -->
                <div id="route-cards" class="hidden space-y-4">
                    <h3 class="font-bold text-gray-700 text-sm mb-2">Rutas Encontradas:</h3>
                    <div id="cards-container" class="space-y-3"></div>
                </div>
            </div>

            <!-- Input de Chat -->
            <div class="p-4 border-t border-gray-100 bg-gray-50">
                <div class="flex gap-2">
                    <input type="text" id="chat-input" placeholder="Escribe origen y destino..." 
                           class="flex-1 p-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button id="send-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition-colors">
                        Enviar
                    </button>
                </div>
            </div>
        </div>

        <!-- Área Derecha: Mapa -->
        <div class="flex-1 relative">
            <div id="map"></div>
            
            <!-- Instrucciones del Mapa -->
            <div id="map-instructions" class="absolute top-4 left-1/2 -translate-x-1/2 z-[1000] bg-white/90 backdrop-blur px-4 py-2 rounded-full shadow-lg border border-blue-100 text-xs font-bold text-blue-600 flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-blue-600 animate-pulse"></div>
                <span id="instruction-text">Haz clic para marcar el PUNTO DE PARTIDA</span>
            </div>

            <!-- Overlay de carga -->
            <div id="loader" class="hidden absolute inset-0 bg-white/50 backdrop-blur-sm z-[1000] flex items-center justify-center">
                <div class="bg-white p-4 rounded-xl shadow-2xl flex items-center gap-3">
                    <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-blue-600"></div>
                    <span class="text-sm font-bold text-gray-700">Calculando rutas reales...</span>
                </div>
            </div>
        </div>

    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
